# Skip Netlify builds for commits that don't touch the React app.
#
# Why: the dashboard is back to "Active builds" mode (the tag-gating
# approach via build hook didn't work — "Stopped builds" silently
# dropped the hook POSTs despite the Netlify docs saying hooks should
# bypass it; 3 hook fires returned 200 OK but no build ran, see
# https://github.com/modoutaya/safaricash/pull/147 retrospective).
#
# So we're back to push-based auto-deploys, but with this ignore rule
# to avoid building on every commit. Many commits in this repo only
# touch planning artifacts (_bmad-output/), Supabase migrations
# (deployed via `supabase db push --linked`, NOT Netlify), Edge
# Functions (deployed via the supabase CLI), Cloudflare worker code
# (workers/, deployed via wrangler), or tests — none of which change
# the built `dist/` artifact. Each of those builds eats Netlify
# minutes for nothing.
#
# How the ignore contract works:
#   - exit 0   → SKIP the build
#   - exit 1+  → run the build
# `git diff --quiet A B -- <paths>` is exactly that: 0 when no listed
# path changed between A and B, 1 when at least one did.
#
# CACHED_COMMIT_REF = the commit of the last SUCCESSFUL build for this
# branch (main or the PR's head). COMMIT_REF = the current commit. So
# the ignore-check covers exactly the delta a build would actually
# reflect. On the first build of a new branch CACHED_COMMIT_REF is
# empty, the script errors with a non-zero exit code, and Netlify
# builds — that's the safe default.
#
# Build settings (command="npm run build", publish="dist", env vars,
# redirects, etc.) stay in the Netlify dashboard — this file ONLY
# adds the ignore rule. Adding `command`/`publish` here would override
# them silently, so we deliberately don't.
[build]
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- src public index.html package.json package-lock.json vite.config.ts tailwind.config.ts postcss.config.js tsconfig.json tsconfig.node.json .nvmrc netlify.toml"
