name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Local Supabase stack credentials. These are the well-known public dev keys
# shipped by `supabase start` — identical on every machine, NOT secrets.
# They are documented at https://supabase.com/docs/guides/local-development.
# DO NOT confuse with the cloud project's anon/service-role keys, which live
# in GitHub Actions secrets and are NEVER used by CI tests.
env:
  SUPABASE_LOCAL_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
  SUPABASE_LOCAL_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU

jobs:
  # ---------------------------------------------------------------------------
  # Story 1.8 — two parallel jobs to halve wall-clock. lint-unit surfaces
  # lint / typecheck / build / coverage fast; e2e-integration runs the
  # Supabase + Playwright + Deno + wrangler gate.
  # ---------------------------------------------------------------------------
  lint-unit:
    name: Lint • Typecheck • Unit tests • Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup + install + lint + typecheck + build
        uses: ./.github/actions/setup-and-build

      # Note: Vitest + coverage run in the e2e-integration job, NOT here.
      # Reason: src/domain/audit/hashChain.contract.test.ts (NFR-S6 SQL↔TS
      # parity gate installed by Story 1.2) throws when CI=true without a
      # reachable Supabase stack. Only the e2e-integration job provisions
      # that stack. Splitting coverage away would miss the contract-test
      # branches, so we consolidate all test execution there.

  e2e-integration:
    name: Supabase • Playwright • axe • RLS • wrangler • Deno
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ----- Local Supabase stack — required by RLS isolation E2E and
      # SQL ↔ TS hash-chain contract test. The stack is excluded of the
      # services we don't need (studio, realtime, storage, edge-runtime, etc.)
      # to keep startup under ~30s.
      - name: Start local Supabase stack
        run: |
          # Story 2.6 — edge-runtime is required (re-auth Edge Function is
          # the first E2E consumer; future Stories 7.4 / 9.3 / 6.x will use
          # it too for settlement / CSV export / receipt resend gates).
          npx supabase start \
            --exclude=studio,inbucket,realtime,storage,vector,pooler,imgproxy,supavisor

      # ----- Rate-limit Worker dev server — unblocks tests/e2e/rate-limit.spec.ts.
      # wrangler dev binds KV to Miniflare's in-memory impl, so no Cloudflare
      # account or real KV namespace is needed for CI.
      - name: Start wrangler dev (rate-limit worker)
        run: |
          # Run wrangler dev in the background; redirect its logs so job
          # output stays readable on failure.
          npx wrangler dev \
            --config workers/rate-limit/wrangler.toml \
            --port 8787 \
            --ip 127.0.0.1 \
            --log-level warn \
            > /tmp/wrangler-dev.log 2>&1 &
          echo "WRANGLER_PID=$!" >> "$GITHUB_ENV"

          # Readiness probe — poll /health up to 30 s before proceeding.
          # Story 1.8 AC 6 adds the /health endpoint specifically to make
          # this probe deterministic.
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8787/health > /dev/null; then
              echo "wrangler dev ready after ${i}x 0.5s polls"
              exit 0
            fi
            sleep 0.5
          done
          echo "wrangler dev did not become ready within 30s — last logs:" >&2
          cat /tmp/wrangler-dev.log >&2 || true
          exit 1

      # ----- Receipt-url Worker dev server (Story 6.4) — port 8788.
      - name: Start wrangler dev (receipt-url worker)
        run: |
          npx wrangler dev \
            --config workers/receipt-url/wrangler.toml \
            --port 8788 \
            --ip 127.0.0.1 \
            --log-level warn \
            --var SUPABASE_PROJECT_URL:http://127.0.0.1:54321 \
            --var SUPABASE_SERVICE_ROLE_KEY:${{ env.SUPABASE_LOCAL_SERVICE_ROLE_KEY }} \
            > /tmp/wrangler-receipt-url.log 2>&1 &
          echo "WRANGLER_RECEIPT_URL_PID=$!" >> "$GITHUB_ENV"

          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8788/health > /dev/null; then
              echo "wrangler dev (receipt-url) ready after ${i}x 0.5s polls"
              exit 0
            fi
            sleep 0.5
          done
          echo "wrangler dev (receipt-url) did not become ready within 30s — last logs:" >&2
          cat /tmp/wrangler-receipt-url.log >&2 || true
          exit 1

      - name: Unit tests with coverage (Vitest + SQL↔TS contract)
        env:
          SUPABASE_TEST_URL: http://127.0.0.1:54321
          SUPABASE_TEST_SERVICE_ROLE_KEY: ${{ env.SUPABASE_LOCAL_SERVICE_ROLE_KEY }}
          # VITE_* vars are required by src/infrastructure/supabase/env.ts's
          # eager Zod validation — any module that transitively imports the
          # supabase singleton (e.g. features/member/api/useMembers.ts)
          # triggers the load at vitest module-resolution time. Reuse the
          # local Supabase stack values.
          VITE_SUPABASE_URL: http://127.0.0.1:54321
          VITE_SUPABASE_ANON_KEY: ${{ env.SUPABASE_LOCAL_ANON_KEY }}
        run: npm run test -- --run --coverage

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage/
          retention-days: 7

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          version=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: E2E tests (Playwright + axe + RLS isolation + session fixtures)
        env:
          # RLS spec + OTP tests hit Supabase via the service-role admin API.
          SUPABASE_TEST_URL: http://127.0.0.1:54321
          SUPABASE_TEST_ANON_KEY: ${{ env.SUPABASE_LOCAL_ANON_KEY }}
          SUPABASE_TEST_SERVICE_ROLE_KEY: ${{ env.SUPABASE_LOCAL_SERVICE_ROLE_KEY }}
          # Story 1.8 — enables the seedCollector fixture so the three
          # previously-skipped specs (flow-5-signout, session-idle-timeout,
          # flow-5-login OTP-verify) actually run in CI.
          SUPABASE_TEST_SEED_READY: "1"
          # Story 1.8 — rate-limit.spec.ts auto-detects this.
          WORKER_BASE_URL: http://127.0.0.1:8787
          # Story 6.4 — receipt-url-worker.spec.ts auto-detects this.
          RECEIPT_URL_WORKER_BASE: http://127.0.0.1:8788
          # Vite reads VITE_* from process.env; without these the dev server
          # spawned by playwright.config.ts crashes at module-load in
          # src/infrastructure/supabase/env.ts and React never mounts.
          VITE_SUPABASE_URL: http://127.0.0.1:54321
          VITE_SUPABASE_ANON_KEY: ${{ env.SUPABASE_LOCAL_ANON_KEY }}
        run: npx playwright test

      # ----- Edge Function tests (Deno) — Story 1.3 onward.
      - name: Cache Deno deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Edge Function tests (Deno + RLS-bound HMAC + lockout gates)
        env:
          SUPABASE_TEST_URL: http://127.0.0.1:54321
          SUPABASE_TEST_ANON_KEY: ${{ env.SUPABASE_LOCAL_ANON_KEY }}
          SUPABASE_TEST_SERVICE_ROLE_KEY: ${{ env.SUPABASE_LOCAL_SERVICE_ROLE_KEY }}
          TERMII_API_KEY: mock-key-not-used-in-tests
          TERMII_INBOUND_SECRET: ci-test-inbound-secret
        run: npm run test:edge

      - name: Stop wrangler dev
        if: always()
        run: |
          if [ -n "${WRANGLER_PID:-}" ]; then
            kill "$WRANGLER_PID" 2>/dev/null || true
          fi
          if [ -n "${WRANGLER_RECEIPT_URL_PID:-}" ]; then
            kill "$WRANGLER_RECEIPT_URL_PID" 2>/dev/null || true
          fi

      - name: Stop local Supabase stack
        if: always()
        run: npx supabase stop --no-backup || true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload wrangler dev logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wrangler-dev-log
          path: /tmp/wrangler-dev.log
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Story 1.8 — conventional-commits enforcement. PR-only because a direct
  # push to main has no base SHA for the commit range.
  # ---------------------------------------------------------------------------
  commitlint:
    name: Commitlint (Conventional Commits)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # commitlint needs the full range between base and head.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate commit range
        run: |
          npx commitlint \
            --from=${{ github.event.pull_request.base.sha }} \
            --to=${{ github.event.pull_request.head.sha }} \
            --verbose
