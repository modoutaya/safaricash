# Trigger a Netlify production build only when a release tag is pushed.
#
# Why: the Netlify dashboard is set to "Stopped builds" so no push (main
# or PR branches) triggers a Netlify build automatically. Releases ship
# explicitly: tag a commit on main with `vX.Y.Z`, push the tag, this
# workflow POSTs to Netlify's build hook, Netlify builds the production
# branch HEAD and deploys it.
#
# IMPORTANT: Netlify's build hook always builds the HEAD of the branch
# the hook was configured for (main). So always tag the HEAD of main —
# never an older commit — otherwise Netlify will deploy a different
# commit than the one your tag points to.
#
# Setup (one-time, already done as of 2026-05-23):
# - Netlify dashboard → Build status: Stopped builds
# - Netlify dashboard → Build hooks: created "tag-deploy" on main
# - GitHub repo → Settings → Secrets → NETLIFY_BUILD_HOOK_URL = the hook URL
name: Deploy to Netlify on tag

on:
  push:
    tags:
      - "v*"

# Minimal permissions: the workflow only reads metadata and calls an
# external URL. No write to the repo, no PR comments.
permissions:
  contents: read

# A second tag push (rare but possible during a botched release) cancels
# the in-flight POST so we don't fire two builds back-to-back.
concurrency:
  group: netlify-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trigger-netlify:
    runs-on: ubuntu-latest
    steps:
      - name: POST to Netlify build hook
        env:
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "${NETLIFY_BUILD_HOOK_URL:-}" ]; then
            echo "::error::NETLIFY_BUILD_HOOK_URL secret is empty or missing."
            exit 1
          fi
          # `trigger_title` shows up in the Netlify Deploys feed so we can
          # see which tag caused which deploy without leaving Netlify. The
          # `-f` flag makes curl exit non-zero on HTTP 4xx/5xx, so a bad
          # hook URL or server-side rejection fails this job loudly.
          curl -fsSL --max-time 30 -X POST \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${NETLIFY_BUILD_HOOK_URL}?trigger_title=Tag+${TAG_NAME}"
          echo "Triggered Netlify build for tag ${TAG_NAME}."
